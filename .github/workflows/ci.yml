name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Test, Lint, & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        run: npx turbo run lint

      - name: Type Check & Build
        run: npx turbo run build

      - name: Unit Tests
        run: npx turbo run test

      - name: Check Bundle Size
        run: npx turbo run size

      - name: Validate Extension Manifest
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('✅ manifest.json is valid JSON')"
        working-directory: apps/extension

      - name: Validate Context Injector Manifest
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('✅ manifest.json is valid JSON')"
        working-directory: apps/context-injector

  security:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
