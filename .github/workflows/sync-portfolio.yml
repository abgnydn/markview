# Daily sync of barisgunaydin.com's project hub.
# Pulls README / CHANGELOG / last-50 commits for every project listed in
# apps/web/projects.json and writes static bundles under
# apps/web/public/portfolio/. Cron runs at 20:00 UTC = 03:00 Asia/Bangkok.

name: sync-portfolio

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-portfolio
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Sync portfolio bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node apps/web/scripts/sync-portfolio.mjs

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/portfolio
          if git diff --staged --quiet; then
            echo "no portfolio changes — skipping commit"
            exit 0
          fi
          git commit -m "chore(portfolio): daily sync $(date -u +%Y-%m-%d)"
          git push
