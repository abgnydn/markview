name: Deploy web → Cloudflare Pages

# Deploys apps/web to Cloudflare Pages on every push to main.
# Replaces the broken git-integration auto-deploy (last working
# 2026-05-22; reason unknown). Source of truth for the production
# build from here on.
#
# Requires repo secrets:
#   CF_API_TOKEN     — Cloudflare API token with Pages:Edit permission
#                       (https://dash.cloudflare.com/profile/api-tokens →
#                        "Create token" → use "Edit Cloudflare Pages" template)
#   CF_ACCOUNT_ID    — find in the URL when viewing the markview project
#                       in Cloudflare dashboard, or `wrangler whoami`

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: build + deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (runs prebuild → prerender-projects + vite build)
        working-directory: apps/web
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=markview --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
