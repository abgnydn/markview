name: Publish @markview/webcomponent

on:
  push:
    tags:
      - 'wc-v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      
      - name: Install core dependencies
        run: npm install
        working-directory: packages/core

      - name: Build core
        run: npm run build
        working-directory: packages/core
      
      - name: Install webcomponent dependencies
        run: npm install
        working-directory: packages/webcomponent
      
      - name: Build & Publish
        run: npm publish --access public --provenance
        working-directory: packages/webcomponent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
