<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DavaKasası 3D Dünyası — Bolu Hukuk Şehri</title>
<meta name="description" content="DavaKasası özelliklerinin yaşadığı oyuncak Bolu kasabası. Adliye, müvekkil evleri, Yargıtay kulesi, bilirkişi laboratuvarı ve dahası — tıkla, keşfet.">
<meta name="theme-color" content="#0a1929">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0a1929;
    --parchment:  #f5e6d3;
    --gold:       #c9a14b;
    --gold-hot:   #e9c766;
    --bordeaux:   #7c1d1d;
    --forest:     #1f4e3d;
    --serif: "Cormorant Garamond", Georgia, serif;
    --sans:  "Inter", -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--ink); color: var(--parchment); font-family: var(--sans); }
  #c { display: block; width: 100vw; height: 100vh; cursor: grab; }
  #c:active { cursor: grabbing; }

  /* Top-left wordmark */
  .wordmark {
    position: fixed; top: 18px; left: 22px; z-index: 10;
    font-family: var(--serif); font-size: 22px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--parchment); pointer-events: none;
    text-shadow: 0 2px 12px rgba(0,0,0,0.55);
  }
  .wordmark .small { display: block; font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: 0.18em; opacity: 0.7; text-transform: uppercase; margin-top: 2px; }

  /* Bottom hint bar */
  .hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 10; padding: 8px 18px;
    background: rgba(10,25,41,0.62); backdrop-filter: blur(10px);
    border: 1px solid rgba(201,161,75,0.28); border-radius: 999px;
    font-size: 12px; letter-spacing: 0.06em; color: var(--parchment); opacity: 0.9;
    pointer-events: none;
  }
  .hint b { color: var(--gold-hot); font-weight: 600; }

  /* Time-of-day badge */
  .clock {
    position: fixed; top: 18px; right: 22px; z-index: 10;
    padding: 6px 14px; background: rgba(10,25,41,0.62); backdrop-filter: blur(10px);
    border: 1px solid rgba(201,161,75,0.28); border-radius: 999px;
    font-family: var(--serif); font-size: 14px; color: var(--gold-hot);
    pointer-events: none;
  }

  /* Feature caption panel — appears on click */
  .panel {
    position: fixed; left: 50%; bottom: 70px; transform: translate(-50%, 20px);
    z-index: 20; max-width: 540px; min-width: 320px; max-height: 70vh; overflow-y: auto;
    background: rgba(10,25,41,0.94); backdrop-filter: blur(14px);
    border: 1px solid rgba(201,161,75,0.45); border-radius: 8px;
    padding: 18px 22px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 60px rgba(201,161,75,0.08);
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
  }
  .panel.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
  .panel h3 { font-family: var(--serif); font-size: 22px; font-weight: 600; color: var(--gold-hot); margin-bottom: 6px; }
  .panel .tag { display: inline-block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(201,161,75,0.4); padding: 2px 8px; border-radius: 999px; margin-bottom: 10px; }
  .panel p { font-size: 14px; line-height: 1.55; color: var(--parchment); opacity: 0.92; margin-bottom: 14px; }
  .panel .close { position: absolute; top: 8px; right: 12px; cursor: pointer; opacity: 0.5; font-size: 22px; user-select: none; }
  .panel .close:hover { opacity: 1; }
  /* Widget area — interactive tools live here */
  .widget { margin-top: 12px; padding-top: 14px; border-top: 1px solid rgba(201,161,75,0.18); }
  .widget label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin: 8px 0 4px; }
  .widget input, .widget select, .widget textarea {
    width: 100%; padding: 8px 10px; background: rgba(245,230,211,0.06); border: 1px solid rgba(201,161,75,0.3);
    border-radius: 4px; color: var(--parchment); font-family: inherit; font-size: 14px; outline: none;
  }
  .widget input:focus, .widget select:focus, .widget textarea:focus { border-color: var(--gold-hot); }
  .widget textarea { resize: vertical; min-height: 60px; }
  .widget button {
    margin-top: 10px; padding: 8px 16px; background: var(--gold); color: var(--ink); border: none; border-radius: 4px;
    font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; letter-spacing: 0.05em;
  }
  .widget button:hover { background: var(--gold-hot); }
  .widget .result {
    margin-top: 12px; padding: 10px 12px; background: rgba(201,161,75,0.08);
    border-left: 3px solid var(--gold); border-radius: 4px; font-family: var(--serif);
    font-size: 16px; color: var(--gold-hot); line-height: 1.5;
  }
  .widget .result.bad  { background: rgba(255,90,74,0.1); border-color: #ff5a4a; color: #ff8a7a; }
  .widget .result.good { background: rgba(108,209,126,0.1); border-color: #6cd17e; color: #9aff8a; }
  .widget .row { display: flex; gap: 8px; }
  .widget .row > * { flex: 1; }
  .widget .chip {
    display: inline-block; padding: 5px 10px; margin: 3px 4px 3px 0; cursor: pointer;
    background: rgba(245,230,211,0.06); border: 1px solid rgba(201,161,75,0.3); border-radius: 999px;
    font-size: 12px; color: var(--parchment); transition: all .15s;
  }
  .widget .chip:hover { background: rgba(201,161,75,0.18); border-color: var(--gold); }
  .drop-zone {
    margin-top: 8px; padding: 22px; text-align: center; border: 2px dashed rgba(201,161,75,0.35);
    border-radius: 6px; color: var(--parchment); opacity: 0.7; font-size: 13px; cursor: pointer;
  }
  .drop-zone.over { background: rgba(201,161,75,0.12); border-color: var(--gold-hot); opacity: 1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wordmark">DavaKasası<span class="small">Bolu Hukuk Şehri · 3D</span></div>
<div class="clock" id="clock">— : —</div>
<div class="hint">Sürükle ile döndür · Tekerlekle yakınlaş · <b>Bina/Karaktere tıkla</b></div>
<div style="position:fixed;top:60px;right:22px;z-index:10;display:flex;gap:6px;flex-direction:column;">
  <button onclick="window.toggleSnow()" style="background:rgba(10,25,41,0.62);backdrop-filter:blur(10px);border:1px solid rgba(201,161,75,0.28);border-radius:999px;padding:6px 14px;color:#f5e6d3;font-family:Inter,sans-serif;font-size:12px;cursor:pointer;letter-spacing:0.04em;">❄ Kar</button>
</div>
<div class="panel" id="panel">
  <span class="close" id="panelClose">×</span>
  <span class="tag" id="panelTag">Özellik</span>
  <h3 id="panelTitle">Hoş geldin</h3>
  <p id="panelBody">Şehri keşfet — her bina, her karakter DavaKasası'nın bir özelliğini temsil ediyor.</p>
  <div class="widget" id="widget" style="display:none"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── renderer ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

// ── scene + camera ───────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a1929, 60, 240);
scene.background = new THREE.Color(0x0a1929);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.5, 600);
camera.position.set(60, 50, 60);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 24;
controls.maxDistance = 160;
controls.maxPolarAngle = Math.PI * 0.48;
controls.target.set(0, 4, 0);

// ── ground: bolu ovası ────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(120, 96),
  new THREE.MeshStandardMaterial({ color: 0x2f4d36, roughness: 0.95, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// path ring (a soft cobblestone road around the town center)
const ring = new THREE.Mesh(
  new THREE.RingGeometry(22, 26, 64),
  new THREE.MeshStandardMaterial({ color: 0x8a7050, roughness: 0.92 })
);
ring.rotation.x = -Math.PI / 2; ring.position.y = 0.02;
scene.add(ring);

// distant hills (low-poly cones around the horizon)
const hills = new THREE.Group();
for (let i = 0; i < 18; i++) {
  const a = (i / 18) * Math.PI * 2;
  const r = 95 + Math.random() * 12;
  const h = 8 + Math.random() * 14;
  const m = new THREE.Mesh(
    new THREE.ConeGeometry(8 + Math.random() * 6, h, 6),
    new THREE.MeshStandardMaterial({ color: 0x3a5a3f, roughness: 1, flatShading: true })
  );
  m.position.set(Math.cos(a) * r, h / 2 - 0.5, Math.sin(a) * r);
  m.castShadow = true; m.receiveShadow = true;
  hills.add(m);
}
scene.add(hills);

// ── lights: anatolian afternoon ───────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff2d1, 1.55);
sun.position.set(40, 70, 28);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;   sun.shadow.camera.bottom = -60;
sun.shadow.camera.near = 1;   sun.shadow.camera.far = 220;
sun.shadow.bias = -0.0005;
scene.add(sun);

const sky = new THREE.HemisphereLight(0xb8d4ff, 0x4a3322, 0.55);
scene.add(sky);

const amb = new THREE.AmbientLight(0xffffff, 0.18);
scene.add(amb);

// sky gradient (a giant sphere with a vertical gradient material)
const skyGeo = new THREE.SphereGeometry(280, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite: false,
  uniforms: { top: { value: new THREE.Color(0x4a8fc7) }, bot: { value: new THREE.Color(0xf3d8a8) } },
  vertexShader: `varying float vy; void main(){ vy = normalize(position).y; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `uniform vec3 top; uniform vec3 bot; varying float vy; void main(){ float k = smoothstep(-0.05, 0.55, vy); gl_FragColor = vec4(mix(bot, top, k), 1.0); }`
});
const skyDome = new THREE.Mesh(skyGeo, skyMat);
scene.add(skyDome);
scene.fog.color = new THREE.Color(0xc9d8e8);
scene.background = null;

// ── shared TR flag texture (used by Atatürk Anıtı + flagpole) ─────────
const flagCanvas = document.createElement('canvas');
flagCanvas.width = 256; flagCanvas.height = 170;
const fctx = flagCanvas.getContext('2d');
fctx.fillStyle = '#e30a17'; fctx.fillRect(0, 0, 256, 170);
fctx.fillStyle = '#ffffff'; fctx.beginPath(); fctx.arc(105, 85, 38, 0, Math.PI * 2); fctx.fill();
fctx.fillStyle = '#e30a17'; fctx.beginPath(); fctx.arc(118, 85, 30, 0, Math.PI * 2); fctx.fill();
fctx.fillStyle = '#ffffff';
fctx.translate(160, 85); fctx.beginPath();
for (let _i = 0; _i < 10; _i++) {
  const _r = _i % 2 === 0 ? 18 : 8; const _a = -Math.PI / 2 + _i * Math.PI / 5;
  if (_i === 0) fctx.moveTo(Math.cos(_a) * _r, Math.sin(_a) * _r);
  else fctx.lineTo(Math.cos(_a) * _r, Math.sin(_a) * _r);
}
fctx.closePath(); fctx.fill();
const flagTex = new THREE.CanvasTexture(flagCanvas);

// ── shared tree materials (used by Köroğlu, Yedigöller, treeGroup) ────
const treeMatT = new THREE.MeshStandardMaterial({ color: 0x6e4628, roughness: 0.9 });
const treeMatL = new THREE.MeshStandardMaterial({ color: 0x2c5e36, roughness: 0.85, flatShading: true });

// ── feature registry (every clickable thing) ──────────────────────────
const FEATURES = []; // { mesh, key, title, body, tag }
function feature(group, key, title, tag, body) {
  Object.assign(group.userData, { key, title, tag, body });
  group.traverse(o => { if (o.isMesh) o.userData.parent = group; });
  FEATURES.push(group);
  return group;
}

// ── adliye (central courthouse) ───────────────────────────────────────
const adliye = new THREE.Group();
const stoneMat = new THREE.MeshStandardMaterial({ color: 0xece0cc, roughness: 0.78 });
const goldMat  = new THREE.MeshStandardMaterial({ color: 0xc9a14b, metalness: 0.55, roughness: 0.32 });
const roofMat  = new THREE.MeshStandardMaterial({ color: 0x7c1d1d, roughness: 0.7 });

const base = new THREE.Mesh(new THREE.BoxGeometry(14, 1.2, 11), stoneMat);
base.position.y = 0.6; base.castShadow = base.receiveShadow = true; adliye.add(base);

const body = new THREE.Mesh(new THREE.BoxGeometry(11.5, 5.5, 8.5), stoneMat);
body.position.y = 1.2 + 2.75; body.castShadow = body.receiveShadow = true; adliye.add(body);

// 6 columns front
for (let i = 0; i < 6; i++) {
  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 5.5, 16), stoneMat);
  col.position.set(-5 + i * 2, 1.2 + 2.75, 4.6);
  col.castShadow = true; adliye.add(col);
}

// pediment (triangular roof)
const ped = new THREE.Mesh(new THREE.CylinderGeometry(0.001, 5.7, 2.6, 3, 1), roofMat);
ped.rotation.x = Math.PI / 2; ped.rotation.z = Math.PI;
ped.position.set(0, 1.2 + 5.5 + 1.4, 0); ped.scale.z = 0.9;
ped.castShadow = true;
const pedFix = new THREE.Mesh(new THREE.BoxGeometry(13, 2.6, 9.5), roofMat);
pedFix.position.set(0, 1.2 + 5.5 + 1.3, 0);
pedFix.castShadow = true;
// simpler: use a wedge made of two slanted planes — replace with a tetra-roof
adliye.remove(ped);
const roofL = new THREE.Mesh(new THREE.BoxGeometry(13, 0.4, 5.5), roofMat);
roofL.position.set(0, 1.2 + 5.5 + 1.0, -1.4); roofL.rotation.x = -0.5; roofL.castShadow = true;
const roofR = roofL.clone(); roofR.rotation.x = 0.5; roofR.position.z = 1.4;
adliye.add(roofL); adliye.add(roofR);

// terazi (scales of justice, gold) on the pediment
const terazi = new THREE.Group();
const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 2.4, 12), goldMat);
pole.position.y = 1.2; terazi.add(pole);
const beam = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.08, 0.08), goldMat);
beam.position.y = 2.3; terazi.add(beam);
for (const x of [-1.0, 1.0]) {
  const dish = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.25, 0.12, 16), goldMat);
  dish.position.set(x, 1.95, 0); terazi.add(dish);
  const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4, 6), goldMat);
  wire.position.set(x, 2.15, 0); terazi.add(wire);
}
terazi.position.set(0, 1.2 + 5.5 + 2.2, 0);
adliye.add(terazi);

scene.add(feature(adliye, 'adliye', 'Adliye — Şehrin Kalbi',
  'Merkez', 'DavaKasası ekosisteminin merkez sembolü. Tüm hızlandırılmış iş akışları buradan akar: süre takibi, duruşma brifingleri, tutanak transkripsiyonu.'));

// ── avukat ofisi (south-east of adliye) ───────────────────────────────
const ofis = new THREE.Group();
const woodMat = new THREE.MeshStandardMaterial({ color: 0x6e4628, roughness: 0.85 });
const cream  = new THREE.MeshStandardMaterial({ color: 0xf5e6d3, roughness: 0.78 });
const win    = new THREE.MeshStandardMaterial({ color: 0xe9c766, emissive: 0xe9c766, emissiveIntensity: 0.5, roughness: 0.5 });

const oBase = new THREE.Mesh(new THREE.BoxGeometry(6, 4.5, 5), cream);
oBase.position.y = 2.25; oBase.castShadow = oBase.receiveShadow = true; ofis.add(oBase);
const oRoof = new THREE.Mesh(new THREE.ConeGeometry(4.5, 2.4, 4), roofMat);
oRoof.rotation.y = Math.PI / 4; oRoof.position.y = 5.5; oRoof.castShadow = true; ofis.add(oRoof);
// gold trim band
const trim = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.25, 5.2), goldMat);
trim.position.y = 4.45; ofis.add(trim);
// 2 lit windows + door
for (const [x, z] of [[-1.3, 2.51], [1.3, 2.51]]) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.1, 0.05), win);
  w.position.set(x, 2.5, z); ofis.add(w);
}
const door = new THREE.Mesh(new THREE.BoxGeometry(1.0, 2.0, 0.08), woodMat);
door.position.set(0, 1.0, 2.55); ofis.add(door);
// rooftop sign — golden book (DavaKasası)
const book = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.85, 0.18), goldMat);
book.position.set(0, 7.4, 0); book.rotation.z = 0.1; ofis.add(book);

ofis.position.set(16, 0, 9);
ofis.rotation.y = -0.6;
scene.add(feature(ofis, 'ofis', 'Avukat Ofisi — Senin Masanın Yeri',
  'Çekirdek', 'Vault, 3D dosya haritası, kronoloji, Türkçe arama. Cmd+K komut paleti her şeye 1 kısayol uzaklıkta. Sesli not, dilekçe taslakları, müvekkil hesap durumu.'));

// ── müvekkil mahallesi (cute houses scattered around) ─────────────────
const palette = [0xc9b27a, 0xb87a52, 0x8aa67a, 0x9aaecf, 0xd4a08a, 0xb5b27a, 0xa07c93];
const muvekkiller = new THREE.Group();
const housePositions = [];
for (let i = 0; i < 14; i++) {
  const a = (i / 14) * Math.PI * 2 + Math.random() * 0.18;
  const r = 38 + (i % 3) * 6 + Math.random() * 4;
  housePositions.push([Math.cos(a) * r, Math.sin(a) * r]);
}
housePositions.forEach(([x, z], i) => {
  const h = new THREE.Group();
  const c = palette[i % palette.length];
  const wallMat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.86 });
  const w = 2.6 + Math.random() * 1.0, dh = 2.6 + Math.random() * 1.0;
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, dh, w * 0.85), wallMat);
  wall.position.y = dh / 2; wall.castShadow = wall.receiveShadow = true; h.add(wall);
  const rf = new THREE.Mesh(new THREE.ConeGeometry(w * 0.85, 1.4, 4),
    new THREE.MeshStandardMaterial({ color: 0x6b3a2a, roughness: 0.78 }));
  rf.rotation.y = Math.PI / 4; rf.position.y = dh + 0.7; rf.castShadow = true; h.add(rf);
  const winSm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.05), win);
  winSm.position.set(0, dh * 0.55, w * 0.43); h.add(winSm);
  h.position.set(x, 0, z);
  h.rotation.y = Math.random() * Math.PI;
  muvekkiller.add(h);
});
scene.add(feature(muvekkiller, 'muvekkil', 'Müvekkil Mahallesi',
  'İletişim', 'WhatsApp şablon cevapları, sesli mesaj transkripti, otomatik haftalık özet e-posta, müvekkil portalı. Müvekkillerle iletişimin yarısı buradan akar.'));

// ── yargıtay kulesi (tall pillar with crown of laurels) ───────────────
const yargitay = new THREE.Group();
const marble = new THREE.MeshStandardMaterial({ color: 0xe8e3d7, roughness: 0.5, metalness: 0.05 });
const tBase = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 4.0, 1.0, 16), stoneMat);
tBase.position.y = 0.5; tBase.castShadow = tBase.receiveShadow = true; yargitay.add(tBase);
const shaft = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.6, 12, 16), marble);
shaft.position.y = 7.0; shaft.castShadow = true; yargitay.add(shaft);
// horizontal grooves (stone bands)
for (let i = 0; i < 5; i++) {
  const band = new THREE.Mesh(new THREE.CylinderGeometry(2.45, 2.45, 0.18, 16), goldMat);
  band.position.y = 2 + i * 2.4; yargitay.add(band);
}
// crown (top capital)
const cap = new THREE.Mesh(new THREE.CylinderGeometry(3.0, 2.2, 0.7, 16), goldMat);
cap.position.y = 13.4; cap.castShadow = true; yargitay.add(cap);
// laurel ring (torus) on top
const laurel = new THREE.Mesh(new THREE.TorusGeometry(2.4, 0.2, 8, 24),
  new THREE.MeshStandardMaterial({ color: 0x1f4e3d, roughness: 0.7 }));
laurel.rotation.x = Math.PI / 2; laurel.position.y = 14.0; yargitay.add(laurel);
// glowing finial (a verified-tick lantern)
const finial = new THREE.Mesh(new THREE.OctahedronGeometry(0.9),
  new THREE.MeshStandardMaterial({ color: 0xe9c766, emissive: 0xe9c766, emissiveIntensity: 0.9 }));
finial.position.y = 15.4; yargitay.add(finial);
yargitay.userData.spin = finial; // animate later

yargitay.position.set(-12, 0, 18);
scene.add(feature(yargitay, 'yargitay', 'Yargıtay Kulesi — Doğrulayıcı',
  'Anti-Hallucination', 'ChatGPT/Claude\'ın söylediği her Yargıtay kararını yerel veri tabanında anında doğrular. Var = yeşil. Yok = kırmızı. Uydurma karar derdi biter.'));

// ── UYAP geçidi (glowing torus archway with floating documents) ───────
const uyap = new THREE.Group();
const arch = new THREE.Mesh(
  new THREE.TorusGeometry(3.4, 0.5, 14, 48, Math.PI),

const beamBrown = new THREE.MeshStandardMaterial({ color: 0x4a3422, roughness: 0.85 });
const tileRoof  = new THREE.MeshStandardMaterial({ color: 0xc94e2a, roughness: 0.8 });
function ottomanHouse(x, z, r) {
  const h = new THREE.Group();
  // first storey (slightly narrower)
  const f1 = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.6, 1.8), wallWhite);
  f1.position.y = 0.8; f1.castShadow = f1.receiveShadow = true; h.add(f1);

  f2.position.y = 2.5; f2.castShadow = true; h.add(f2);
  // brown beam frame on second storey
  for (const [px, pz, w, hh] of [[1.21, 0, 0.06, 1.6], [-1.21, 0, 0.06, 1.6], [0, 1.11, 2.4, 0.06], [0, -1.11, 2.4, 0.06]]) {
    const beam = new THREE.Mesh(new THREE.BoxGeometry(w === 0.06 ? w : w, hh === 0.06 ? hh : hh, w === 0.06 ? 2.2 : 0.06), beamBrown);
    beam.position.set(px, 2.5, pz); h.add(beam);
  }
  // roof (clay tile, pitched)
  const rf = new THREE.Mesh(new THREE.ConeGeometry(2.0, 1.2, 4), tileRoof);
  rf.rotation.y = Math.PI / 4; rf.position.y = 4.0; rf.castShadow = true; h.add(rf);
  // small window on second storey (yellow lit)
  const wn = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.05), win);
  wn.position.set(0, 2.5, 1.13); h.add(wn);
  h.position.set(x, 0, z); h.rotation.y = r; return h;
}

const SNOW_COUNT = 600;
const snowPos = new Float32Array(SNOW_COUNT * 3);

for (let i = 0; i < SNOW_COUNT; i++) {
  snowPos[i*3+0] = (Math.random() - 0.5) * 180;
  snowPos[i*3+1] = Math.random() * 80 + 10;
  snowPos[i*3+2] = (Math.random() - 0.5) * 180;
  snowVel[i] = 0.04 + Math.random() * 0.06;
}
const snowGeo = new THREE.BufferGeometry();
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
const snowMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.35, transparent: true, opacity: 0.85, depthWrite: false

// snow toggle (default ON in winter months Nov-Mar; can be toggled)
let snowOn = (new Date().getMonth() <= 2 || new Date().getMonth() >= 10);
function setSnow(on) { snow.visible = on; snowOn = on; }
setSnow(snowOn);
window.toggleSnow = () => setSnow(!snowOn);

// in the render loop, advance snowflakes (we patch the loop below)
const _snowTick = () => {
  if (!snow.visible) return;
  const p = snow.geometry.attributes.position.array;
  for (let i = 0; i < SNOW_COUNT; i++) {
    p[i*3+1] -= snowVel[i];
    p[i*3+0] += Math.sin(performance.now() * 0.0005 + i) * 0.012;
    if (p[i*3+1] < 0) { p[i*3+1] = 80; p[i*3+0] = (Math.random()-0.5)*180; p[i*3+2] = (Math.random()-0.5)*180; }
  }
  snow.geometry.attributes.position.needsUpdate = true;
};

// flag wave: gently undulate the flag plane vertices
const flagPositions = flagGroup.userData.flag.geometry.attributes.position;
const _flagTick = (t) => {
  for (let i = 0; i < flagPositions.count; i++) {
    const x = flagPositions.getX(i);
    flagPositions.setZ(i, Math.sin(x * 1.2 + t * 2.6) * 0.18 * (x + 2.0));
  }
  flagPositions.needsUpdate = true;
};

// ── render loop ───────────────────────────────────────────────────────
const clock = new THREE.Clock();
function tick() {
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // lawyer walks the cobblestone ring (radius 24)
  lawyer.userData.t = (lawyer.userData.t || 0) + dt * 0.18;
  const lt = lawyer.userData.t;
  lawyer.position.set(Math.cos(lt) * 24, 0, Math.sin(lt) * 24);
  lawyer.rotation.y = -lt + Math.PI / 2;
  lawyer.position.y = Math.abs(Math.sin(t * 5)) * 0.08; // tiny bounce

  // spinners on misc objects
  if (yargitay.userData.spin) yargitay.userData.spin.rotation.y = t * 1.2;
  if (bank.userData.spin)     bank.userData.spin.rotation.z   = t * 0.6;
  if (wa.userData.spin)       wa.userData.spin.rotation.y     = t * 0.5;
  if (obs.userData.spin)      obs.userData.spin.rotation.y    = t * 0.18;
  if (lab.userData.spin)      lab.userData.spin.rotation.y    = t * 1.4;
  if (cesme.userData.su) { // water flow shimmer
    cesme.userData.su.material.opacity = 0.55 + Math.sin(t * 6) * 0.12;
    cesme.userData.su.scale.y = 1.0 + Math.sin(t * 4) * 0.08;
  }

  // UYAP docs orbit through the portal
  if (uyap.userData.docs) uyap.userData.docs.forEach((d, i) => {
    const tt = t * 0.6 + d.userData.t;
    d.position.set(Math.cos(tt) * d.userData.r * 2.3, 3.5 + Math.sin(tt * 2) * 0.5, Math.sin(tt) * d.userData.r * 0.4);
    d.rotation.y = tt * 0.5;
  });

  // observatory witnesses orbit
  if (obs.userData.witnesses) obs.userData.witnesses.children.forEach((w, i) => {
    const tt = t * 0.6 + w.userData.t;
    w.position.set(Math.cos(tt) * 1.6, 5.5 + Math.sin(tt) * 0.3, Math.sin(tt) * 1.6);
    w.lookAt(obs.position.x, 5.5, obs.position.z);
  });

  // KEP envelope rises and resets
  if (kep.userData.env) {
    const ph = (t * 0.4) % 1.0;
    kep.userData.env.position.y = 5.6 + ph * 3.5;
    kep.userData.env.material.opacity = 1.0 - ph;
    kep.userData.env.material.transparent = true;
    kep.userData.env.rotation.y = t * 1.2;
  }

  // clock tower hands (real time of day)
  const now = new Date();
  const hr = (now.getHours() % 12) + now.getMinutes() / 60;
  const mn = now.getMinutes() + now.getSeconds() / 60;
  if (clockTower.userData.hands) {
    clockTower.userData.hands.hourHand.rotation.z = -hr * (Math.PI / 6);
    clockTower.userData.hands.minHand.rotation.z = -mn * (Math.PI / 30);
  }

  // day/night cycle — driven by the actual clock + a fast demo loop
  const hours = now.getHours() + now.getMinutes() / 60;
  // map 0..24 hours → 0..1 sky position; sun arcs west→east
  const dayPhase = ((hours - 6 + 24) % 24) / 24; // 0 = sunrise, 0.5 = sunset
  const sunAngle = dayPhase * Math.PI * 2;
  const sunY = Math.sin(sunAngle) * 70;
  const sunX = Math.cos(sunAngle) * 70;
  sun.position.set(sunX, Math.max(sunY, -10), 28);
  // brightness: high when sun is up, dim at night
  const dayK = Math.max(0, Math.sin(sunAngle));
  sun.intensity = 0.2 + dayK * 1.5;
  sky.intensity = 0.15 + dayK * 0.55;
  amb.intensity = 0.10 + dayK * 0.18;
  // sky color shifts: dawn pink → midday blue → dusk amber → night indigo
  const dawn  = new THREE.Color(0xffb27a);
  const noon  = new THREE.Color(0x4a8fc7);
  const dusk  = new THREE.Color(0xe9805a);
  const night = new THREE.Color(0x0a1a2e);
  let topC, botC;
  if (dayPhase < 0.05) { topC = dawn.clone().lerp(noon, dayPhase / 0.05); botC = new THREE.Color(0xffd9a8); }
  else if (dayPhase < 0.45) { topC = noon; botC = new THREE.Color(0xf3d8a8); }
  else if (dayPhase < 0.55) { topC = noon.clone().lerp(dusk, (dayPhase - 0.45) / 0.10); botC = new THREE.Color(0xff9a6a); }
  else { topC = dusk.clone().lerp(night, Math.min(1, (dayPhase - 0.55) / 0.20)); botC = new THREE.Color(0x2a1a3a); }
  skyMat.uniforms.top.value.copy(topC);
  skyMat.uniforms.bot.value.copy(botC);
  scene.fog.color.copy(botC).lerp(topC, 0.5);
  // clock badge in top-right
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') +
    (dayK > 0.05 ? ' ☀' : ' ☾');
  // lanterns warm up at night
  const nightK = 1.0 - dayK;
  lanterns.forEach(({ head, light }) => {
    head.material.emissiveIntensity = nightK * 1.4;
    light.intensity = nightK * 2.4;
  });
  // ezan vakti — minare alem'i 5 namaz vaktinde 30 sn parlasın
  const ezanHours = [5, 6, 13, 17, 20];
  const inEzan = ezanHours.some(h => Math.abs(hours - h) < 0.008); // ~30sn
  if (cami.userData.alem) {
    cami.userData.alem.material.emissiveIntensity = inEzan ? 1.6 + Math.sin(t * 8) * 0.4 : 0.4;
  }

  _snowTick();
  _flagTick(t);

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

const ray = new THREE.Raycaster();

function pickFeature(ev) {
  ndc.x = (ev.clientX / window.innerWidth) * 2 - 1;
  ndc.y = -(ev.clientY / window.innerHeight) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(FEATURES, true);
  for (const h of hits) {
    let g = h.object;
    while (g && !g.userData.title) g = g.parent;
    if (g && g.userData.title) return g;
  }
  return null;
}

    const sorular = [

            </span>

        if (won) {
          window.__duelEffect && window.__duelEffect('victory');
        } else {
          window.__duelEffect && window.__duelEffect('defeat');
        }
        return;
      }
      const q = picks[i];
      el.innerHTML = `
        <div style="margin-bottom:14px;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold)">
          Düello · Soru ${i+1}/${picks.length} · Skor ${score}

        ${q[1].map((opt, j) => `<button class="duel-opt" data-j="${j}" style="display:block;width:100%;margin:6px 0;text-align:left;background:rgba(245,230,211,0.06);color:var(--parchment);border:1px solid rgba(201,161,75,0.3);padding:10px 14px;font-weight:400">${esc(opt)}</button>`).join('')}`;
      el.querySelectorAll('.duel-opt').forEach(b => b.onclick = () => {
        const j = +b.dataset.j;
        const correct = j === q[2];
        if (correct) { score++; window.__duelEffect && window.__duelEffect('correct'); b.style.background = 'rgba(108,209,126,0.2)'; b.style.borderColor = '#6cd17e'; }
        else { window.__duelEffect && window.__duelEffect('wrong'); b.style.background = 'rgba(255,90,74,0.18)'; b.style.borderColor = '#ff5a4a';

        el.querySelectorAll('.duel-opt').forEach(x => x.disabled = true);
        setTimeout(() => { i++; render(); }, 900);
      });
    };
    render();
  },

// expose for testing & for Cmd+K integration
window.__renderWidget = key => {
  const r = WIDGETS[key]; if (!r) return false;
  // Set panel title from feature if it exists
  const f = FEATURES.find(g => g.userData.key === key);
  if (f) { pTitle.textContent = f.userData.title; pBody.textContent = f.userData.body; pTag.textContent = f.userData.tag; }
  widgetEl.style.display = 'block'; widgetEl.innerHTML = ''; r(widgetEl);
  panel.classList.add('show'); return true;
};

// Cmd+K / Ctrl+K → command palette
window.addEventListener('keydown', ev => {
  if ((ev.metaKey || ev.ctrlKey) && ev.key.toLowerCase() === 'k') {
    ev.preventDefault();
    pTitle.textContent = 'Komut Paleti';
    pTag.textContent = 'Klavye';
    pBody.textContent = 'Her özelliğe saniyeler içinde ulaş. Yaz, Enter ile aç. Esc ile kapat.';
    widgetEl.style.display = 'block'; widgetEl.innerHTML = '';
    WIDGETS.ofis(widgetEl);
    panel.classList.add('show');
    setTimeout(() => document.getElementById('w-cmd')?.focus(), 50);
  }
  if (ev.key === 'Escape') panel.classList.remove('show');
});

canvas.addEventListener('click', ev => {
  const f = pickFeature(ev);
  if (!f) return;
  pTitle.textContent = f.userData.title;
  pBody.textContent  = f.userData.body;
  pTag.textContent   = f.userData.tag;
  // render widget if one exists for this key
  const renderer = WIDGETS[f.userData.key];
  if (renderer) { widgetEl.style.display = 'block'; widgetEl.innerHTML = ''; renderer(widgetEl); }
  else { widgetEl.style.display = 'none'; widgetEl.innerHTML = ''; }
  panel.classList.add('show');
  // little bounce animation on the picked object
  const start = f.position.y;
  let p = 0;
  const bounce = () => { p += 0.06;
    f.position.y = start + Math.sin(p * Math.PI) * 0.6;
    if (p < 1) requestAnimationFrame(bounce); else f.position.y = start;
  };
  bounce();
});

// ── auto-reload (10-line poller) ──────────────────────────────────────
let _lastMod = null;
setInterval(async () => {
  try {
    const r = await fetch(location.href, { method: 'HEAD', cache: 'no-store' });
    const m = r.headers.get('last-modified');
    if (_lastMod && m && m !== _lastMod) location.reload();
    _lastMod = _lastMod || m;
  } catch {}
}, 1200);
</script>
