<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Hub — Fleet Dashboard</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #15171c;
    --panel-2: #1b1e25;
    --border: #23262f;
    --text: #e6e7ea;
    --dim: #7a7f8c;
    --dimmer: #4a4e59;
    --accent: #7aa2f7;
    --warn: #e0af68;
    --ok: #9ece6a;
    --bad: #f7768e;
    --info: #7dcfff;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 13px/1.45 var(--mono);
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    font-size: 14px; font-weight: 600; margin: 0;
    letter-spacing: 0.08em; color: var(--accent);
  }
  header .stats {
    display: flex; gap: 18px; flex: 1;
    font-size: 12px; color: var(--dim);
  }
  header .stat { display: flex; gap: 6px; }
  header .stat b { color: var(--text); font-weight: 600; }
  header .stat.warn b { color: var(--warn); }
  header .stat.bad b { color: var(--bad); }
  header input.q {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font: inherit; width: 260px;
  }
  header input.q:focus { outline: none; border-color: var(--accent); }

  main {
    padding: 14px;
    overflow-x: auto;
  }
  .kanban {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 340px;
    gap: 14px;
    align-items: start;
    min-height: calc(100vh - 70px);
  }
  .lane {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 200px;
  }
  .lane h2 {
    font-size: 11px; margin: 0; padding: 4px 6px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim); display: flex; justify-content: space-between;
  }
  .lane h2 .count { color: var(--text); }
  .lane[data-status="Needs Input"] h2 { color: var(--warn); }
  .lane[data-status="Processing"] h2 { color: var(--accent); }
  .lane[data-status="Waiting"] h2 { color: var(--info); }
  .lane[data-status="Idle"] h2,
  .lane[data-status="Archive"] h2 { color: var(--dimmer); }
  .lane.drop-target {
    box-shadow: 0 0 0 2px var(--accent) inset;
  }

  .card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: grab;
    resize: both; overflow: auto;
    min-width: 300px; min-height: 180px;
    max-width: 520px; max-height: 80vh;
    display: flex; flex-direction: column; gap: 8px;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; }
  .card.pulse { animation: cardPulse 0.55s ease-out; }
  @keyframes cardPulse {
    0%   { box-shadow: 0 0 0 0 var(--accent); }
    60%  { box-shadow: 0 0 0 10px rgba(122, 162, 247, 0); }
    100% { box-shadow: 0 0 0 0 rgba(122, 162, 247, 0); }
  }
  .card .tool-flash {
    position: absolute; top: 6px; right: 6px;
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--accent); color: var(--bg);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .card .tool-flash.show { opacity: 1; }
  .card { position: relative; }
  .card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card .title {
    font-weight: 600; font-size: 13px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .pid {
    font-size: 10px; color: var(--dim);
    padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px;
    flex-shrink: 0;
  }

  .row {
    display: flex; gap: 12px; align-items: baseline;
    font-size: 11px; color: var(--dim);
  }
  .row .v { color: var(--text); font-weight: 600; }
  .row .big { font-size: 16px; color: var(--text); font-weight: 700; }

  .bar {
    background: var(--border); height: 4px; border-radius: 2px;
    position: relative; overflow: hidden;
  }
  .bar > span {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--accent);
    transition: width 0.3s;
  }
  .bar.warn > span { background: var(--warn); }
  .bar.bad > span { background: var(--bad); }

  .chip {
    display: inline-block;
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--border); color: var(--dim);
  }
  .chip.dollar { background: #2a2517; color: var(--warn); }
  .chip.dollar.hot { background: #3a1a22; color: var(--bad); }

  .files, .tools, .todos {
    display: flex; flex-direction: column; gap: 2px;
    font-size: 11px;
  }
  .files .f, .tools .t {
    display: flex; justify-content: space-between;
    color: var(--dim);
  }
  .files .f .path {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    direction: rtl; text-align: left;
    flex: 1; min-width: 0;
  }
  .files .f .n, .tools .t .n { color: var(--text); flex-shrink: 0; }

  .section-label {
    font-size: 10px; color: var(--dimmer);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 4px;
  }

  .errors {
    font-size: 10px; color: var(--bad);
    max-height: 48px; overflow: hidden; opacity: 0.8;
    border-left: 2px solid var(--bad);
    padding-left: 6px;
  }

  .actions {
    display: flex; gap: 4px; margin-top: auto; padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .actions button {
    flex: 1; background: var(--border); color: var(--text);
    border: none; border-radius: 4px; padding: 4px 6px;
    font: inherit; font-size: 10px; cursor: pointer;
  }
  .actions button:hover { background: var(--accent); color: var(--bg); }

  /* Expanded modal */
  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .backdrop.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
    width: min(900px, 95vw); max-height: 90vh; overflow: auto;
    font-size: 13px;
  }
  .modal h3 { margin: 0 0 10px 0; color: var(--accent); }
  .modal pre {
    background: var(--bg); padding: 12px; border-radius: 6px;
    overflow: auto; font-size: 11px;
    border: 1px solid var(--border);
  }
  .modal .close {
    float: right; background: none; color: var(--dim);
    border: none; font-size: 16px; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>CLAUDE HUB</h1>
  <div class="stats">
    <div class="stat">sessions <b id="st-count">—</b></div>
    <div class="stat">total cost <b id="st-cost">—</b></div>
    <div class="stat">burn/hr <b id="st-burn">—</b></div>
    <div class="stat warn">needs input <b id="st-ni">—</b></div>
    <div class="stat">priciest <b id="st-top">—</b></div>
  </div>
  <input class="q" id="q" placeholder="filter: project, pid, file, tool…" />
</header>

<main>
  <div class="kanban" id="kanban"></div>
</main>

<div class="backdrop" id="backdrop">
  <div class="modal">
    <button class="close" id="close">×</button>
    <h3 id="modal-title"></h3>
    <pre id="modal-body"></pre>
  </div>
</div>

<script>
// ==== DATA (populated by fetch from /api/brain/fleet every 10s) ====
let FLEET = [];

// ==== UI ====
const LANES = ["Needs Input", "Processing", "Waiting", "Idle"];

function fmt$(v) {
  if (v == null) return "—";
  if (v >= 100) return "$" + v.toFixed(0);
  return "$" + v.toFixed(2);
}
function fmtPct(v) { return v == null ? "—" : v.toFixed(1) + "%"; }
function fmtElapsed(s) {
  if (s == null) return "—";
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? `${h}h ${m}m` : `${m}m`;
}
function fmtTokens(n) {
  if (n == null) return "—";
  if (n > 1e9) return (n / 1e9).toFixed(1) + "B";
  if (n > 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n > 1e3) return (n / 1e3).toFixed(0) + "k";
  return String(n);
}
function shortPath(p) {
  if (!p) return "";
  const parts = p.split("/");
  if (parts.length <= 3) return p;
  return ".../" + parts.slice(-3).join("/");
}
function statusFor(s) {
  if (!s) return "Idle";
  if (LANES.includes(s)) return s;
  return "Idle";
}

function cardHTML(s) {
  const costClass = (s.cost_usd || 0) > 500 ? "hot" : "";
  const ctxClass = (s.context_pct || 0) > 70 ? "warn" : (s.context_pct || 0) > 90 ? "bad" : "";
  const files = (s.files_modified || []).slice(0, 3).map(f =>
    `<div class="f"><span class="path" title="${f.path}">${shortPath(f.path)}</span><span class="n">${f.edits}</span></div>`
  ).join("");
  const tools = (s.tool_usage || []).slice(0, 3).map(t =>
    `<div class="t"><span>${t.tool}</span><span class="n">${t.calls}</span></div>`
  ).join("");
  const errs = (s.recent_errors || []).slice(0, 1).map(e =>
    `<div class="errors" title="${(e.message||'').replace(/"/g,'&quot;')}">⚠ ${e.tool || '?'}: ${(e.message || '').slice(0, 80)}…</div>`
  ).join("");

  return `
    <div class="card" draggable="true" data-pid="${s.pid}" data-status="${statusFor(s.status)}">
      <div class="top">
        <div class="title" title="${s.project}">${s.project || '?'}</div>
        <span class="pid">PID ${s.pid}</span>
      </div>
      <div class="row">
        <div><span class="big">${fmt$(s.cost_usd)}</span> <span class="chip dollar ${costClass}">cost</span></div>
        <div>burn <span class="v">${fmt$(s.burn_rate_per_hr)}/hr</span></div>
      </div>
      <div>
        <div class="row"><span>context</span><span class="v">${fmtPct(s.context_pct)}</span></div>
        <div class="bar ${ctxClass}"><span style="width:${s.context_pct || 0}%"></span></div>
      </div>
      <div class="row">
        <div>elapsed <span class="v">${fmtElapsed(s.elapsed_secs)}</span></div>
        <div>in <span class="v">${fmtTokens(s.tokens_in)}</span></div>
        <div>out <span class="v">${fmtTokens(s.tokens_out)}</span></div>
      </div>
      ${files ? `<div class="section-label">files</div><div class="files">${files}</div>` : ""}
      ${tools ? `<div class="section-label">tools</div><div class="tools">${tools}</div>` : ""}
      ${errs}
      <div class="actions">
        <button data-act="focus">focus</button>
        <button data-act="attach">attach</button>
        <button data-act="expand">expand</button>
      </div>
    </div>
  `;
}

function render(filter = "") {
  const kb = document.getElementById("kanban");
  kb.innerHTML = "";
  const bucket = Object.fromEntries(LANES.map(l => [l, []]));
  for (const s of FLEET) {
    bucket[statusFor(s.status)].push(s);
  }
  const fltr = filter.trim().toLowerCase();
  for (const lane of LANES) {
    const laneEl = document.createElement("div");
    laneEl.className = "lane";
    laneEl.dataset.status = lane;
    const items = bucket[lane].filter(s => {
      if (!fltr) return true;
      const hay = [s.project, s.pid, ...(s.files_modified || []).map(f => f.path), ...(s.tool_usage || []).map(t => t.tool)].join(" ").toLowerCase();
      return hay.includes(fltr);
    });
    laneEl.innerHTML = `<h2>${lane}<span class="count">${items.length}</span></h2>` + items.map(cardHTML).join("");
    kb.appendChild(laneEl);
  }
  wireDrag();
  wireCards();
}

function wireDrag() {
  document.querySelectorAll(".card").forEach(c => {
    c.addEventListener("dragstart", e => {
      c.classList.add("dragging");
      e.dataTransfer.setData("text/plain", c.dataset.pid);
    });
    c.addEventListener("dragend", () => c.classList.remove("dragging"));
  });
  document.querySelectorAll(".lane").forEach(l => {
    l.addEventListener("dragover", e => { e.preventDefault(); l.classList.add("drop-target"); });
    l.addEventListener("dragleave", () => l.classList.remove("drop-target"));
    l.addEventListener("drop", e => {
      e.preventDefault();
      l.classList.remove("drop-target");
      const pid = e.dataTransfer.getData("text/plain");
      const card = document.querySelector(`.card[data-pid="${pid}"]`);
      if (card) {
        l.appendChild(card);
        card.dataset.status = l.dataset.status;
        // placeholder: would POST intent to server to pause/resume/etc
        console.log(`moved PID ${pid} to lane ${l.dataset.status}`);
      }
    });
  });
}

function wireCards() {
  document.querySelectorAll(".card button").forEach(b => {
    b.addEventListener("click", async e => {
      e.stopPropagation();
      const pid = b.closest(".card").dataset.pid;
      const act = b.dataset.act;
      if (act === "expand") return openModal(pid);
      if (act === "focus") {
        const orig = b.textContent;
        b.textContent = "…";
        try {
          const r = await fetch(`/api/brain/focus/${pid}`, { method: "POST" });
          const j = await r.json();
          b.textContent = j.ok ? "✓ focused" : "not found";
        } catch { b.textContent = "err"; }
        setTimeout(() => { b.textContent = orig; }, 1200);
        return;
      }
      console.log(`action: ${act} PID ${pid}`);
    });
  });
}

function openModal(pid) {
  const s = FLEET.find(x => x.pid == pid);
  if (!s) return;
  document.getElementById("modal-title").textContent = `${s.project} — PID ${s.pid}`;
  document.getElementById("modal-body").textContent = JSON.stringify(s, null, 2);
  document.getElementById("backdrop").classList.add("open");
}
document.getElementById("close").addEventListener("click", () => {
  document.getElementById("backdrop").classList.remove("open");
});
document.getElementById("backdrop").addEventListener("click", e => {
  if (e.target.id === "backdrop") document.getElementById("backdrop").classList.remove("open");
});

function updateStats() {
  const n = FLEET.length;
  const tc = FLEET.reduce((a, s) => a + (s.cost_usd || 0), 0);
  const tb = FLEET.reduce((a, s) => a + (s.burn_rate_per_hr || 0), 0);
  const ni = FLEET.filter(s => s.status === "Needs Input").length;
  const top = FLEET.slice().sort((a,b) => (b.cost_usd||0) - (a.cost_usd||0))[0];
  document.getElementById("st-count").textContent = n;
  document.getElementById("st-cost").textContent = fmt$(tc);
  document.getElementById("st-burn").textContent = fmt$(tb);
  document.getElementById("st-ni").textContent = ni;
  document.getElementById("st-top").textContent = top ? `${top.project}/${top.pid}` : "—";
}

document.getElementById("q").addEventListener("input", e => render(e.target.value));

async function refresh() {
  try {
    const r = await fetch('/api/brain/fleet', {cache: 'no-store'});
    if (!r.ok) return;
    const j = await r.json();
    FLEET = j.fleet || [];
    render(document.getElementById('q').value);
    updateStats();
    document.title = `Claude Hub — ${FLEET.length} sessions`;
  } catch (e) { console.warn('refresh failed', e); }
}
refresh();
setInterval(refresh, 10000);

// ==== Live event stream ====
function pulseCard(pid, tool) {
  const card = document.querySelector(`.card[data-pid="${pid}"]`);
  if (!card) return;
  card.classList.remove("pulse");
  void card.offsetWidth; // reflow so animation restarts
  card.classList.add("pulse");
  let flash = card.querySelector(".tool-flash");
  if (!flash) {
    flash = document.createElement("div");
    flash.className = "tool-flash";
    card.appendChild(flash);
  }
  flash.textContent = tool || "tool";
  flash.classList.add("show");
  clearTimeout(flash._t);
  flash._t = setTimeout(() => flash.classList.remove("show"), 700);
}

function connectEvents() {
  const es = new EventSource("/api/brain/events");
  es.addEventListener("hello", () => console.log("SSE connected"));
  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      (ev.pids || []).forEach(pid => pulseCard(pid, ev.tool));
    } catch {}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectEvents, 3000); // reconnect
  };
}
connectEvents();
</script>
</body>
</html>
