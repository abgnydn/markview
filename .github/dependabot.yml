version: 2
updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      dev-tooling:
        patterns:
          - "husky"
          - "lint-staged"
          - "turbo"
          - "@changesets/*"

  # Web app (Vite + React SPA)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "codemirror"
          - "@lezer/*"
      collab:
        patterns:
          - "yjs"
          - "y-*"
      testing:
        patterns:
          - "vitest"
          - "@playwright/test"
          - "@vitejs/*"

  # Share worker (Cloudflare Worker)
  - package-ecosystem: "npm"
    directory: "/apps/share-worker"
    schedule:
      interval: "weekly"
      day: "monday"

  # Core package (markdown engine)
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
