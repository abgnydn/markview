name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test, Type Check & Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      # Web App
      - name: Install web dependencies
        run: npm install
        working-directory: apps/web
      
      - name: Run web unit tests
        run: npm test
        working-directory: apps/web
      
      - name: Type check web
        run: npx tsc --noEmit
        working-directory: apps/web
      
      - name: Build web
        run: npm run build
        working-directory: apps/web
      
      # MCP Server
      - name: Install MCP dependencies
        run: npm install
        working-directory: apps/mcp
      
      - name: Run MCP tests
        run: npm test
        working-directory: apps/mcp
      
      - name: Type check & build MCP
        run: npm run build
        working-directory: apps/mcp
