# SPDX-License-Identifier: Apache-2.0
#
# Cross-platform desktop release pipeline.
#
# Triggers:
#   - Push a tag matching `desktop-v*` (e.g. `desktop-v0.1.0`)
#   - Manual workflow_dispatch
#
# Builds the Tauri app on four runners and attaches every platform's
# installer to a single GitHub Release at:
#
#   https://github.com/abgnydn/markview/releases/latest
#
# Artifacts:
#   macOS arm64  → MarkView_<v>_aarch64.dmg
#   macOS x64    → MarkView_<v>_x64.dmg
#   Windows x64  → MarkView_<v>_x64-setup.exe + .msi
#   Linux x64    → markview_<v>_amd64.deb + .AppImage
#
# No code signing yet — users will see "unidentified developer" on first
# launch (macOS: right-click → Open). When we get an Apple Developer
# account, the commented APPLE_* env vars below activate tauri-action's
# signing path automatically.

name: release-desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Cross-compile both Mac targets from a single Apple Silicon
          # runner — the Intel (macos-13) runner pool has been starving
          # the queue with 30-60min waits. The aarch64 native build also
          # produces the x86_64 binary via `--target x86_64-apple-darwin`.
          - os: macos-14
            target: aarch64-apple-darwin
            label: macOS arm64
          - os: macos-14
            target: x86_64-apple-darwin
            label: macOS x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x64
    runs-on: ${{ matrix.os }}
    name: build ${{ matrix.label }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build web (Vite → apps/web/out)
        run: bun --filter @markview/web build

      - name: Build + bundle Tauri + attach to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When signing keys land in repo secrets, uncomment:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Markview ${{ github.ref_name }}"
          releaseBody: |
            **Markview Desktop** — local-first markdown editor with sharing.

            ### Install

            - **macOS** — Download the `.dmg`, drag MarkView to `/Applications`.
              First launch: right-click → **Open** (we'll switch to a signed
              build once we have an Apple Developer account).
            - **Windows** — Download the `.msi` and run it.
            - **Linux** — Download the `.AppImage` (run directly) or `.deb`.

            ### Set as default markdown editor (macOS)

            Right-click any `.md` file → **Get Info** → **Open With** →
            **MarkView** → **Change All**.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
