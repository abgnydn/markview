<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brain View — Live Knowledge Graph</title>
<style>
  :root {
    --bg: #12141a;
    --panel: rgba(26, 29, 37, 0.94);
    --border: #2e323d;
    --text: #f2f3f7;
    --dim: #a0a6b3;
    --accent: #8ab4ff;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font: 12px/1.45 var(--mono);
  }
  #graph { position: fixed; inset: 0; }
  .hud {
    position: fixed; top: 12px; left: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; gap: 14px; align-items: center;
    backdrop-filter: blur(8px);
    z-index: 5;
  }
  .hud h1 { margin: 0; font-size: 13px; letter-spacing: 0.1em; color: var(--accent); }
  .hud .stat { color: var(--dim); }
  .hud .stat b { color: var(--text); }
  .hud input {
    background: #0e0f12; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 8px; font: inherit; width: 200px;
  }
  .hud a {
    color: var(--dim); text-decoration: none;
    padding: 4px 8px; border: 1px solid var(--border); border-radius: 5px;
  }
  .hud a:hover { color: var(--text); border-color: var(--accent); }

  .legend {
    position: fixed; bottom: 12px; left: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; font-size: 11px;
    z-index: 5;
  }
  .legend h2 { margin: 0 0 6px 0; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .legend .row { display: flex; gap: 6px; align-items: center; margin: 2px 0; color: var(--dim); }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; }

  .detail {
    position: fixed; top: 12px; right: 12px;
    width: 360px; max-height: calc(100vh - 24px); overflow: auto;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    display: none; z-index: 6;
  }
  .detail.open { display: block; }
  .detail h3 { margin: 0 0 8px 0; color: var(--accent); font-size: 13px; word-break: break-all; }
  .detail .kv { display: flex; gap: 8px; font-size: 11px; color: var(--dim); margin: 2px 0; }
  .detail .kv b { color: var(--text); font-weight: 600; }
  .detail .close {
    float: right; background: none; color: var(--dim);
    border: none; font-size: 18px; cursor: pointer; margin: -8px -4px 0 0;
  }
  .detail .rel {
    color: var(--dim); font-size: 11px; padding: 2px 0;
    border-top: 1px dashed var(--border);
  }
  .detail .rel b { color: var(--text); }
</style>
<!-- 3d-force-graph UMD bundles its own Three.js; do NOT load three separately. -->
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
</head>
<body>

<div class="hud">
  <h1>BRAIN</h1>
  <div class="stat">nodes <b id="n-count">—</b></div>
  <div class="stat">edges <b id="e-count">—</b></div>
  <div class="stat">sessions <b id="s-count">—</b></div>
  <input id="q" placeholder="highlight node…" />
  <a href="/">← dashboard</a>
</div>

<div class="legend">
  <h2>Legend</h2>
  <div class="row"><span class="dot" style="background:#7aa2f7"></span>project</div>
  <div class="row"><span class="dot" style="background:#bb9af7"></span>concept / resource</div>
  <div class="row"><span class="dot" style="background:#9ece6a"></span>experiment</div>
  <div class="row"><span class="dot" style="background:#e0af68"></span>meeting</div>
  <div class="row"><span class="dot" style="background:#f7768e"></span>claude session (live)</div>
  <div class="row"><span class="dot" style="background:#7dcfff"></span>agent / persona</div>
  <div class="row"><span class="dot" style="background:#565f89"></span>area / other</div>
  <div class="row"><span class="dot" style="background:#3b4048"></span>ghost (unresolved link)</div>
</div>

<div id="graph"></div>

<div class="detail" id="detail">
  <button class="close" id="detail-close">×</button>
  <h3 id="d-title"></h3>
  <div id="d-meta"></div>
  <div id="d-rels"></div>
</div>

<script>
const COLOR = {
  projects:        '#8ab4ff',
  resources:       '#c8a7ff',
  concept:         '#c8a7ff',
  experiments:     '#a8e676',
  meetings:        '#ffd480',
  'claude-session':'#ff7a94',
  agents:          '#8fe0ff',
  areas:           '#8c95b3',
  daily:           '#8c95b3',
  inbox:           '#8c95b3',
  personas:        '#8fe0ff',
  ghost:           '#6b7285',
};
function colorFor(node) {
  return COLOR[node.type] || COLOR[node.slot] || '#8c95b3';
}

let Graph;
let nodesById = {};
let pidToNode = {}; // live session pid -> node
let filterRe = null;

async function loadGraph() {
  const res = await fetch('/api/brain/graph', {cache: 'no-store'});
  const j = await res.json();
  const g = j.graph;
  nodesById = Object.fromEntries(g.nodes.map(n => [n.id, n]));
  pidToNode = {};
  g.nodes.forEach(n => { if (n.pid) pidToNode[String(n.pid)] = n; });

  document.getElementById('n-count').textContent = g.nodes.length;
  document.getElementById('e-count').textContent = g.edges.length;
  document.getElementById('s-count').textContent = g.nodes.filter(n => n.type === 'claude-session').length;

  // Map edges to node references
  const links = g.edges
    .filter(e => nodesById[e.src] && nodesById[e.dst])
    .map(e => ({source: e.src, target: e.dst, rel: e.rel}));

  // Inject extra ambient + directional light so lambert spheres read at full color
  // (3d-force-graph's built-in lighting is very dim).
  const scene = ForceGraph3D; // placeholder — we'll call this after graph init


  Graph = ForceGraph3D()(document.getElementById('graph'))
    .backgroundColor('#12141a')
    .graphData({nodes: g.nodes, links})
    .cooldownTime(2500)
    .onEngineStop(() => {
      try { Graph.zoomToFit(800, 80); } catch (e) { /* ignore */ }
    })
    .nodeRelSize(10)
    .nodeVal(n => Math.max(6, Math.sqrt((n.size || 1)) * 4))
    .nodeResolution(20)
    .nodeOpacity(1.0)
    .nodeColor(n => {
      if (filterRe && filterRe.test(n.label || '')) return '#ffffff';
      if (n._pulseT && Date.now() - n._pulseT < 500) return '#ffffff';
      return colorFor(n);
    })
    .nodeLabel(n => `<div style="padding:4px 8px;font:11px ui-monospace;background:#15171c;border:1px solid #23262f;border-radius:4px;color:#e6e7ea"><b>${escape(n.label)}</b><br><span style="color:#7a7f8c">${escape(n.type || n.slot)}${n.pid ? ' · pid '+n.pid : ''}</span></div>`)
    .linkColor(l => {
      const rel = l.rel;
      if (rel === 'works_on') return 'rgba(255, 122, 148, 0.95)';
      if (rel === 'depends_on') return 'rgba(255, 212, 128, 0.9)';
      if (rel === 'part_of') return 'rgba(168, 230, 118, 0.85)';
      if (rel === 'follows' || rel === 'precedes' || rel === 'next' || rel === 'continues')
        return 'rgba(200, 167, 255, 0.8)';
      return 'rgba(138, 180, 255, 0.25)';
    })
    .linkWidth(l => l.rel === 'works_on' ? 2.5 : 0.3)
    .linkOpacity(0.35)
    .linkDirectionalParticles(l => l.rel === 'works_on' ? 2 : 0)
    .linkDirectionalParticleSpeed(0.01)
    .linkDirectionalParticleWidth(1.2)
    .onNodeClick(node => {
      showDetail(node, g.edges);
      Graph.cameraPosition(
        {x: node.x * 1.3, y: node.y * 1.3, z: node.z * 1.3},
        node, 800
      );
    });

  // Boost scene lighting — the library's default is too dim for our colors.
  const sc = Graph.scene();
  if (sc && sc.children) {
    // Find the THREE constructor via an existing light, then add more.
    const existing = sc.children.find(c => c.isLight);
    if (existing) {
      const Ctor = Object.getPrototypeOf(existing).constructor;
      // Re-use the same constructor chain to build a bright ambient light.
      const Amb = existing.isAmbientLight ? Ctor :
        (sc.children.find(c => c.isAmbientLight) || {}).constructor;
      if (Amb) sc.add(new Amb(0xffffff, 1.5));
      // And a strong directional from above
      const Dir = sc.children.find(c => c.isDirectionalLight)?.constructor;
      if (Dir) {
        const d = new Dir(0xffffff, 1.2);
        d.position.set(1, 1, 1);
        sc.add(d);
      }
    }
  }
}

function escape(s) { return String(s || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]); }

function showDetail(node, allEdges) {
  const d = document.getElementById('detail');
  document.getElementById('d-title').textContent = node.label;
  const meta = document.getElementById('d-meta');
  meta.innerHTML = '';
  for (const k of ['id','type','slot','sensitivity','pid','project','status','cost_usd','context_pct']) {
    if (node[k] != null) meta.innerHTML += `<div class="kv">${k} <b>${escape(node[k])}</b></div>`;
  }
  const rels = document.getElementById('d-rels');
  const out = allEdges.filter(e => e.src === node.id);
  const in_ = allEdges.filter(e => e.dst === node.id);
  rels.innerHTML =
    (out.length ? '<div class="rel"><b>→ out:</b></div>' : '') +
    out.slice(0,20).map(e => `<div class="rel">${e.rel} <b>${escape(nodesById[e.dst]?.label || e.dst)}</b></div>`).join('') +
    (in_.length ? '<div class="rel"><b>← in:</b></div>' : '') +
    in_.slice(0,20).map(e => `<div class="rel"><b>${escape(nodesById[e.src]?.label || e.src)}</b> ${e.rel}</div>`).join('');
  d.classList.add('open');
}
document.getElementById('detail-close').addEventListener('click', () => document.getElementById('detail').classList.remove('open'));

document.getElementById('q').addEventListener('input', e => {
  const q = e.target.value.trim();
  filterRe = q ? new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i') : null;
  if (Graph) { Graph.nodeColor(Graph.nodeColor()); Graph.nodeOpacity(Graph.nodeOpacity()); }
});

// Live pulses from SSE
function connectEvents() {
  const es = new EventSource('/api/brain/events');
  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      (ev.pids || []).forEach(pid => {
        const n = pidToNode[String(pid)];
        if (n) {
          n._pulseT = Date.now();
          if (Graph) Graph.nodeColor(Graph.nodeColor()); // trigger repaint
        }
      });
    } catch {}
  };
  es.onerror = () => { es.close(); setTimeout(connectEvents, 3000); };
}

loadGraph().then(connectEvents);
</script>
</body>
</html>
