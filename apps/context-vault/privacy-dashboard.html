<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Dashboard — MarkView Context Vault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #08061a;
      color: #e2e0f0;
      min-height: 100vh;
    }

    /* Header */
    .header {
      -webkit-app-region: drag;
      padding: 32px 32px 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: #6b6990;
      margin-top: 1px;
    }

    /* Stats Row */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 24px 32px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .stat-card:hover {
      border-color: rgba(124, 58, 237, 0.15);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
    }

    .stat-value.green { color: #4ade80; }
    .stat-value.blue { color: #818cf8; }
    .stat-value.red { color: #f87171; }

    .stat-label {
      font-size: 11px;
      color: #6b6990;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* Section */
    .section {
      padding: 0 32px 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #a5a3c0;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .section-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(99, 102, 241, 0.1);
      color: #818cf8;
    }

    /* Access Log Table */
    .log-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      overflow: hidden;
    }

    .log-table thead th {
      font-size: 10px;
      font-weight: 600;
      color: #6b6990;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 14px;
      text-align: left;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .log-table tbody tr {
      transition: background 0.15s;
    }

    .log-table tbody tr:hover {
      background: rgba(124, 58, 237, 0.04);
    }

    .log-table tbody td {
      font-size: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
      color: #b0aec8;
    }

    .log-table tbody tr:last-child td {
      border-bottom: none;
    }

    .tool-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 5px;
      background: rgba(99, 102, 241, 0.08);
      color: #a5b4fc;
    }

    .result-ok {
      color: #4ade80;
      font-weight: 500;
    }

    .result-denied {
      color: #f87171;
      font-weight: 500;
    }

    .time-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #5b5980;
    }

    .file-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #c4b5fd;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Blocked Patterns */
    .patterns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pattern-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(248, 113, 113, 0.06);
      border: 1px solid rgba(248, 113, 113, 0.1);
      color: #fca5a5;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #5b5980;
      font-size: 13px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
  <div class="header">
    <img src="assets/icon.png" alt="MV" onerror="this.style.display='none'">
    <div class="header-text">
      <h1>Privacy Dashboard</h1>
      <p>MarkView Context Vault</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value green" id="stat-total">0</div>
      <div class="stat-label">Total Accesses</div>
    </div>
    <div class="stat-card">
      <div class="stat-value blue" id="stat-files">0</div>
      <div class="stat-label">Files Shared</div>
    </div>
    <div class="stat-card">
      <div class="stat-value red" id="stat-denied">0</div>
      <div class="stat-label">Denied</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Recent Access Log</span>
      <span class="section-badge" id="log-count">0 entries</span>
    </div>
    <div id="log-container">
      <div class="empty">
        <div class="empty-icon">📋</div>
        <p>No files accessed yet.<br>AI access events will appear here.</p>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Blocked File Patterns</span>
    </div>
    <div class="patterns" id="patterns-container">
      <span class="pattern-tag">*.env</span>
      <span class="pattern-tag">*.pem</span>
      <span class="pattern-tag">*.key</span>
      <span class="pattern-tag">*secret*</span>
      <span class="pattern-tag">*password*</span>
      <span class="pattern-tag">*credential*</span>
      <span class="pattern-tag">*token*</span>
      <span class="pattern-tag">.git/**</span>
      <span class="pattern-tag">node_modules/**</span>
      <span class="pattern-tag">*.sqlite</span>
      <span class="pattern-tag">*.db</span>
    </div>
  </div>

  <script>
    // Listen for data injection from main process
    window.addEventListener('vault-data-ready', (event) => {
      try {
        const data = event.detail || {};
        const log = data.accessLog || [];
        const customPatterns = data.blockedPatterns || [];

        // Stats
        const total = log.length;
        const shared = log.filter(e => e.result === 'ok' || e.result === 'success').length;
        const denied = log.filter(e => e.result === 'denied' || e.result === 'blocked').length;
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-files').textContent = shared;
        document.getElementById('stat-denied').textContent = denied;

        // Log table
        if (log.length > 0) {
          const recent = log.slice(-20).reverse();
          document.getElementById('log-count').textContent = `${log.length} entries`;
          document.getElementById('log-container').innerHTML = `
            <table class="log-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Tool</th>
                  <th>File</th>
                  <th>Result</th>
                </tr>
              </thead>
              <tbody>
                ${recent.map(e => `
                  <tr>
                    <td class="time-cell">${formatTime(e.timestamp)}</td>
                    <td><span class="tool-badge">${e.tool || '—'}</span></td>
                    <td class="file-cell" title="${e.fileAccessed || ''}">${e.fileAccessed || '—'}</td>
                    <td class="${e.result === 'denied' || e.result === 'blocked' ? 'result-denied' : 'result-ok'}">${e.result || 'ok'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }

        // Custom patterns
        if (customPatterns.length > 0) {
          const container = document.getElementById('patterns-container');
          customPatterns.forEach(p => {
            const tag = document.createElement('span');
            tag.className = 'pattern-tag';
            tag.textContent = p;
            tag.style.borderColor = 'rgba(251, 191, 36, 0.15)';
            tag.style.color = '#fcd34d';
            tag.style.background = 'rgba(251, 191, 36, 0.06)';
            container.appendChild(tag);
          });
        }
      } catch (err) {
        console.error('Dashboard render error:', err);
      }
    });

    function formatTime(ts) {
      if (!ts) return '—';
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      } catch (e) { return ts; }
    }
  </script>
</body>
</html>
